<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator Application</title>
    </head>
    <body>
        <div class="container">
            <h1>Calculator Application</h1>
            <input type="number" id="num1" placeholder="First Number" />
            <input type="number" id="num2" placeholder="Second Number" />
            <select id="operation">
                <option value="add">Addition</option><br>
                <option value="subtract">Subtraction</option><br>
                <option value="multiply">Multiplication</option><br>
            </select><br>
            <button id="calculate-btn">Calculate</button>
            <h2 id="result-display">Result: </h2>
            <button id="clear-display-btn">Clear</button>
        
        </div>
        <div id="history-section">
            <h2>Calculation History</h2>
            <ul id="history-list"></ul>
        </div>
        
           
     <script src="calculater.js" ></script>
    </body>
</html>
